<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Belote Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lobby-container">
    <h1>Belote</h1>

    <div class="forms-wrapper">
      <div class="form-section">
        <h2>Create Game</h2>
        <form id="create-form">
          <input type="text" id="create-nick" placeholder="Your nickname" maxlength="30" required>
          <button type="submit">Create Game</button>
        </form>
      </div>

      <div class="form-section">
        <h2>Join Game</h2>
        <form id="join-form">
          <input type="text" id="join-nick" placeholder="Your nickname" maxlength="30" required>
          <input type="text" id="room-id" placeholder="Room ID" required>
          <div class="team-radio">
            <label><input type="radio" name="team" value="A" checked> Team A</label>
            <label><input type="radio" name="team" value="B"> Team B</label>
          </div>
          <button type="submit">Join Game</button>
        </form>
      </div>
    </div>

    <div id="error-display" class="error-msg"></div>
  </div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
