<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waiting — Belote</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/waiting.js"></script>
</head>
<body>
  <div class="card" style="max-width: 480px; width: 100%;">
    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
      <span id="roomLink" style="flex: 1; font-size: 0.85rem; color: #555; word-break: break-all;"></span>
      <button id="copyBtn" style="background: #eee; color: #333; padding: 0.4rem 0.8rem; font-size: 0.8rem;">Copy</button>
    </div>

    <div style="display: flex; gap: 1rem;">
      <div style="flex: 1;">
        <h3 style="color: #1976d2; margin-bottom: 1rem;">Team A</h3>
        <div id="teamA"></div>
      </div>
      <div style="flex: 1;">
        <h3 style="color: #388e3c; margin-bottom: 1rem;">Team B</h3>
        <div id="teamB"></div>
      </div>
    </div>

    <p id="status" style="margin-top: 1.5rem; color: #777; text-align: center; font-size: 0.9rem;"></p>
  </div>
</body>
</html>
